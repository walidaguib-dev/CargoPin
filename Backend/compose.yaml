services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE: "1"
    ports:
      - "5005:5005"
    environment:
      Smtp__Host: ${Smtp__Host}
      Smtp__Port: ${Smtp__Port}
      Smtp__UserName: ${Smtp__UserName}
      Smtp__Password: ${Smtp__Password}
      Smtp__From: ${Smtp__From}
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: ${ConnectionStrings__Default}
      JWT__Issuer: ${JWT__Issuer}
      JWT__Audience: ${JWT__Audience}
      JWT__Key: ${JWT__Key}
      JWT__AccessTokenExpirationMinutes: ${JWT__AccessTokenExpirationMinutes}
      JWT__RefreshTokenExpirationDays: ${JWT__RefreshTokenExpirationDays}
      RedisConnectionString: ${RedisConnectionString}
      CloudinarySettings__CloudName: ${CloudinarySettings__CloudName}
      CloudinarySettings__ApiKey: ${CloudinarySettings__ApiKey}
      CloudinarySettings__ApiSecret: ${CloudinarySettings__ApiSecret}
      Google__ClientId: ${Google__ClientId}
      Google__ClientSecret: ${Google__ClientSecret}
      Google__CallbackPath: ${Google__CallbackPath}
      Google__FrontendUrl: ${Google__FrontendUrl}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5198/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: CargoPin
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  redis_data:
